name: Release to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  checks: read

jobs:
  gate:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release-sha: ${{ steps.release-target.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve release target
        id: release-target
        run: |
          sha="$(git rev-parse HEAD^{commit})"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Release target commit: $sha"

      - name: Verify required CI checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ steps.release-target.outputs.sha }}
        run: |
          set -euo pipefail

          required_checks=(
            "test (3.10)"
            "test (3.11)"
            "test (3.12)"
            "test (3.13)"
            "test (3.14)"
            "lint"
          )

          for attempt in {1..30}; do
            response="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/check-runs?per_page=100")"

            pending=()
            failed=()
            missing=()

            for check in "${required_checks[@]}"; do
              match="$(jq -r --arg name "$check" '
                .check_runs
                | map(select(.name == $name))
                | sort_by(.started_at // .created_at)
                | last
                | if . == null then empty else [.status, (.conclusion // "")] | @tsv end
              ' <<<"$response")"

              if [[ -z "$match" ]]; then
                missing+=("$check")
                continue
              fi

              status="${match%%$'\t'*}"
              conclusion="${match#*$'\t'}"

              if [[ "$status" != "completed" ]]; then
                pending+=("$check: $status")
              elif [[ "$conclusion" != "success" ]]; then
                failed+=("$check: $conclusion")
              fi
            done

            if (( ${#failed[@]} > 0 )); then
              printf 'Required CI checks failed:\n'
              printf -- '- %s\n' "${failed[@]}"
              exit 1
            fi

            if (( ${#missing[@]} == 0 && ${#pending[@]} == 0 )); then
              echo "All required CI checks passed."
              exit 0
            fi

            if (( attempt == 30 )); then
              if (( ${#missing[@]} > 0 )); then
                printf 'Required CI checks were missing:\n'
                printf -- '- %s\n' "${missing[@]}"
              fi
              if (( ${#pending[@]} > 0 )); then
                printf 'Required CI checks were still pending:\n'
                printf -- '- %s\n' "${pending[@]}"
              fi
              exit 1
            fi

            echo "Required CI checks are not ready yet; retrying in 20 seconds."
            sleep 20
          done

  publish:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [gate]
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: release-pypi
      cancel-in-progress: false
    environment:
      name: pypi
      url: https://pypi.org/p/bark-agent-hook
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.release-sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish --trusted-publishing always
