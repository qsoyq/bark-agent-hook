name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_tag:
        description: Existing stable release tag to publish to PyPI.
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dev group
        run: uv sync --group dev --no-install-project

      - name: Run tox
        run: uv run tox -e ${{ matrix.python-version }}

  lint:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dev group
        run: uv sync --group dev --no-install-project

      - name: Check plugin versions
        run: uv run python scripts/check_versions.py

      - name: Check OpenClaw runtime entry syntax
        run: node --check plugins/bark-agent-hook-openclaw/index.js

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  windows-smoke:
    if: github.event_name != 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev group
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build package
        run: uv build

      - name: Codex hook dry-run
        run: uv run bark-agent-hook hook --runtime codex --event completion --dry-run

      - name: Claude hook dry-run
        run: uv run bark-agent-hook hook --runtime claude --event completion --dry-run

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, lint, windows-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      release-created: ${{ steps.release.outputs.created }}
      release-sha: ${{ steps.release.outputs.sha }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install release dependencies
        run: uv sync --group dev --no-install-project

      - name: Resolve project version
        id: version
        run: |
          VERSION=$(uv run python - <<'PY'
          from pathlib import Path
          import tomllib

          doc = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project = doc.get("project", {})
          if not isinstance(project, dict) or not isinstance(project.get("version"), str):
              raise SystemExit("project.version is missing from pyproject.toml")
          print(project["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release if missing
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.version.outputs.version }} already exists; skipping."
          else
            gh release create "${{ steps.version.outputs.version }}" \
              --target "$GITHUB_SHA" \
              --generate-notes \
              --title "${{ steps.version.outputs.version }}"
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

  resolve-manual-publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      publish-tag: ${{ steps.release-target.outputs.tag }}
      release-sha: ${{ steps.release-target.outputs.sha }}
    permissions:
      contents: read
      checks: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release target
        id: release-target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_TAG: ${{ inputs.publish_tag }}
        run: |
          set -euo pipefail

          if [[ ! "$PUBLISH_TAG" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "publish_tag must be a stable x.y.z release tag."
            exit 1
          fi

          release_json="$(gh release view "$PUBLISH_TAG" --json isDraft,isPrerelease,tagName)"
          is_draft="$(jq -r '.isDraft' <<<"$release_json")"
          is_prerelease="$(jq -r '.isPrerelease' <<<"$release_json")"
          tag_name="$(jq -r '.tagName' <<<"$release_json")"

          if [[ "$is_draft" != "false" || "$is_prerelease" != "false" ]]; then
            echo "Release $PUBLISH_TAG must be published and stable."
            exit 1
          fi

          git fetch --force origin "refs/tags/${tag_name}:refs/tags/${tag_name}"
          release_sha="$(git rev-parse "${tag_name}^{commit}")"

          echo "tag=$tag_name" >> "$GITHUB_OUTPUT"
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "Manual PyPI publish target: $tag_name ($release_sha)"

      - name: Verify required CI checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ steps.release-target.outputs.sha }}
        run: |
          set -euo pipefail

          required_checks=(
            "test (3.10)"
            "test (3.11)"
            "test (3.12)"
            "test (3.13)"
            "test (3.14)"
            "lint"
            "windows-smoke"
          )

          response="$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/check-runs?per_page=100")"

          failed=()
          missing=()

          for check in "${required_checks[@]}"; do
            match="$(jq -r --arg name "$check" '
              .check_runs
              | map(select(.name == $name))
              | sort_by(.started_at // .created_at)
              | last
              | if . == null then empty else [.status, (.conclusion // "")] | @tsv end
            ' <<<"$response")"

            if [[ -z "$match" ]]; then
              missing+=("$check")
              continue
            fi

            status="${match%%$'\t'*}"
            conclusion="${match#*$'\t'}"

            if [[ "$status" != "completed" || "$conclusion" != "success" ]]; then
              failed+=("$check: $status/$conclusion")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Required CI checks were missing:\n'
            printf -- '- %s\n' "${missing[@]}"
          fi
          if (( ${#failed[@]} > 0 )); then
            printf 'Required CI checks were not successful:\n'
            printf -- '- %s\n' "${failed[@]}"
          fi
          if (( ${#missing[@]} > 0 || ${#failed[@]} > 0 )); then
            exit 1
          fi

          echo "All required CI checks passed for $RELEASE_SHA."

  publish-pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, lint, release, resolve-manual-publish]
    if: |
      always() &&
      (
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          needs.test.result == 'success' &&
          needs.lint.result == 'success' &&
          needs.release.result == 'success' &&
          needs.release.outputs.release-created == 'true'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          needs.resolve-manual-publish.result == 'success'
        )
      )
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: release-pypi
      cancel-in-progress: false
    environment:
      name: pypi
      url: https://pypi.org/p/bark-agent-hook
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.release-sha || needs.resolve-manual-publish.outputs.release-sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish --trusted-publishing always
