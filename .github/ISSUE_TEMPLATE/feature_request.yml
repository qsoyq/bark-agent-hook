name: Feature Request
description: Propose a user-facing capability.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: background
    attributes:
      label: Background
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should be true when this is complete?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included?
    validations:
      required: true
  - type: textarea
    id: non_scope
    attributes:
      label: Non-goals
      description: What is intentionally excluded?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Use checkboxes for observable acceptance criteria.
      value: "- [ ] "
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Commands, manual checks, or evidence expected.
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: Compatibility, security, rollout, or rollback concerns.
