name: Bug Report
description: Report a reproducible defect.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: background
    attributes:
      label: Background
      description: What happened and why does it matter?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Provide the smallest reproducible command or workflow.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should the fix be verified?
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: Note security, compatibility, or release risks.
